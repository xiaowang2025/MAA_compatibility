name: Auto Build & Release MAA (ARM64)

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      version_tag:
        description: 'MAA 主仓库版本号（留空则检查上游最新 tag）'
        required: false
        default: ''
      maa_cli_ref:
        description: 'maa-cli 的 git ref（tag/branch/commit，留空则使用 main）'
        required: false
        default: 'main'
  schedule:
    - cron: '0 * * * *'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
      target_tag: ${{ steps.check.outputs.target_tag }}
      maa_cli_ref: ${{ steps.check.outputs.maa_cli_ref }}
    steps:
      - name: Get upstream latest tag
        id: get_upstream
        uses: oprypin/find-latest-tag@v1
        with:
          repository: MaaAssistantArknights/MaaAssistantArknights
          releases-only: false

      - name: Check if build is needed
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_TAG: ${{ github.event.inputs.version_tag }}
          INPUT_MAA_CLI_REF: ${{ github.event.inputs.maa_cli_ref }}
          UPSTREAM_TAG: ${{ steps.get_upstream.outputs.tag }}
        run: |
          if [ -n "$INPUT_TAG" ]; then
            TARGET="$INPUT_TAG"
            echo "Trigger: Manual (Target: $TARGET)"
            IS_MANUAL="true"
          else
            TARGET="$UPSTREAM_TAG"
            echo "Trigger: Schedule (Target: $TARGET)"
            IS_MANUAL="false"
          fi

          if [ -n "$INPUT_MAA_CLI_REF" ]; then
            MAA_CLI_REF="$INPUT_MAA_CLI_REF"
          else
            MAA_CLI_REF="main"
          fi

          echo "target_tag=$TARGET" >> "$GITHUB_OUTPUT"
          echo "maa_cli_ref=$MAA_CLI_REF" >> "$GITHUB_OUTPUT"

          echo "Checking if release $TARGET exists in ${{ github.repository }}..."
          if gh release view "$TARGET" --repo ${{ github.repository }} >/dev/null 2>&1; then
            echo "✅ Release $TARGET already exists."
            if [ "$IS_MANUAL" = "true" ]; then
              echo "Force rebuild due to manual trigger."
              echo "should_build=true" >> "$GITHUB_OUTPUT"
            else
              echo "⛔ Skipping build to save CPU time."
              echo "should_build=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "❌ Release $TARGET not found."
            echo "🚀 Starting new build..."
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          fi

  build-and-release:
    needs: check-version
    if: needs.check-version.outputs.should_build == 'true'
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout MAA source
        uses: actions/checkout@v4
        with:
          repository: MaaAssistantArknights/MaaAssistantArknights
          ref: ${{ needs.check-version.outputs.target_tag }}
          submodules: recursive
          fetch-depth: 1
          path: MAA

      - name: Determine Release Type
        run: |
          TAG="${{ needs.check-version.outputs.target_tag }}"
          if [[ "$TAG" == *"beta"* ]] || [[ "$TAG" == *"alpha"* ]] || [[ "$TAG" == *"rc"* ]]; then
            echo "IS_PRERELEASE=true" >> "$GITHUB_ENV"
          else
            echo "IS_PRERELEASE=false" >> "$GITHUB_ENV"
          fi

      - name: Enable arm64 architecture and fix apt sources
        shell: bash
        run: |
          set -euxo pipefail

          sudo dpkg --add-architecture arm64

          # runner 上可能既有 .list 也有 .sources，这里统一把官方 Ubuntu 源限制为 amd64
          if [ -f /etc/apt/sources.list ]; then
            sudo sed -i 's|^deb |deb [arch=amd64] |g' /etc/apt/sources.list
          fi

          if ls /etc/apt/sources.list.d/*.list >/dev/null 2>&1; then
            for f in /etc/apt/sources.list.d/*.list; do
              sudo sed -i 's|^deb \(http://.*ubuntu.*\) |deb [arch=amd64] \1 |g' "$f" || true
              sudo sed -i 's|^deb \(https://.*ubuntu.*\) |deb [arch=amd64] \1 |g' "$f" || true
            done
          fi

          # 给 arm64 单独添加 ports 源
          cat <<'EOF' | sudo tee /etc/apt/sources.list.d/arm64-ports.list
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports jammy main restricted universe multiverse
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports jammy-updates main restricted universe multiverse
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports jammy-backports main restricted universe multiverse
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports jammy-security main restricted universe multiverse
          EOF

          sudo apt-get update

      - name: Show apt sources
        shell: bash
        run: |
          echo "=== /etc/apt/sources.list ==="
          cat /etc/apt/sources.list || true
          echo "=== /etc/apt/sources.list.d ==="
          ls -lah /etc/apt/sources.list.d || true
          for f in /etc/apt/sources.list.d/*; do
            echo "=== $f ==="
            cat "$f" || true
          done

      - name: Install system dependencies
        run: |
          sudo apt-get install -y \
            gcc-aarch64-linux-gnu \
            g++-aarch64-linux-gnu \
            binutils-aarch64-linux-gnu \
            build-essential \
            python3-dev \
            pkg-config \
            wget \
            tar \
            curl \
            git \
            ca-certificates \
            libssl-dev:arm64 \
            zlib1g-dev:arm64

      - name: Install newer CMake
        run: |
          wget https://github.com/Kitware/CMake/releases/download/v3.31.5/cmake-3.31.5-linux-x86_64.tar.gz
          tar -zxvf cmake-3.31.5-linux-x86_64.tar.gz
          echo "${{ github.workspace }}/cmake-3.31.5-linux-x86_64/bin" >> "$GITHUB_PATH"

      - name: Download MAA deps (arm64-linux)
        working-directory: MAA
        run: python3 tools/maadeps-download.py arm64-linux

      - name: Patch MAA toolchain (remove lld requirement)
        working-directory: MAA
        run: |
          sed -i '/CMAKE_LINKER_TYPE/d' src/MaaUtils/MaaDeps/cmake/maa-arm64-linux-toolchain.cmake

      - name: Configure MAA
        working-directory: MAA
        env:
          CC: aarch64-linux-gnu-gcc
          CXX: aarch64-linux-gnu-g++
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DINSTALL_RESOURCE=ON \
            -DINSTALL_PYTHON=ON \
            -DCMAKE_SYSTEM_NAME=Linux \
            -DCMAKE_SYSTEM_PROCESSOR=aarch64 \
            -DCMAKE_TOOLCHAIN_FILE=src/MaaUtils/MaaDeps/cmake/maa-arm64-linux-toolchain.cmake

      - name: Build MAA
        working-directory: MAA
        run: cmake --build build --config Release -j"$(nproc)"

      - name: Install MAA to dist
        working-directory: MAA
        run: cmake --install build --prefix "${{ github.workspace }}/dist"

      - name: Checkout maa-cli
        uses: actions/checkout@v4
        with:
          repository: MaaAssistantArknights/maa-cli
          ref: ${{ needs.check-version.outputs.maa_cli_ref }}
          fetch-depth: 1
          path: maa-cli

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            maa-cli -> target

      - name: Show OpenSSL target files
        run: |
          echo "=== include ==="
          ls -lah /usr/include/aarch64-linux-gnu || true
          echo "=== openssl include ==="
          ls -lah /usr/include/aarch64-linux-gnu/openssl || true
          echo "=== lib ==="
          ls -lah /usr/lib/aarch64-linux-gnu | grep -E 'ssl|crypto' || true
          echo "=== pkgconfig ==="
          ls -lah /usr/lib/aarch64-linux-gnu/pkgconfig | grep -E 'openssl|libssl' || true

      - name: Build maa-cli for aarch64
        working-directory: maa-cli
        env:
          CC_aarch64_unknown_linux_gnu: aarch64-linux-gnu-gcc
          CXX_aarch64_unknown_linux_gnu: aarch64-linux-gnu-g++
          AR_aarch64_unknown_linux_gnu: aarch64-linux-gnu-ar
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          PKG_CONFIG_ALLOW_CROSS: "1"
          PKG_CONFIG_PATH: /usr/lib/aarch64-linux-gnu/pkgconfig
          PKG_CONFIG_LIBDIR: /usr/lib/aarch64-linux-gnu/pkgconfig
          PKG_CONFIG_SYSROOT_DIR: /
          OPENSSL_INCLUDE_DIR: /usr/include/aarch64-linux-gnu
          OPENSSL_LIB_DIR: /usr/lib/aarch64-linux-gnu
        run: |
          cargo build --release --target aarch64-unknown-linux-gnu

      - name: Copy maa executable into dist
        run: |
          cp maa-cli/target/aarch64-unknown-linux-gnu/release/maa dist/maa
          chmod +x dist/maa

      - name: Validate package contents
        run: |
          test -f dist/maa
          test -f dist/libMaaCore.so
          test -d dist/resource
          echo "=== dist contents ==="
          ls -lah dist

      - name: Show linked libraries for maa
        run: |
          aarch64-linux-gnu-readelf -d dist/maa || true

      - name: Pack release tarball
        run: |
          FILENAME="MAA-${{ needs.check-version.outputs.target_tag }}-ARM64-Release.tar.gz"
          tar -zcvf "$FILENAME" -C dist .
          echo "ASSET_PATH=$FILENAME" >> "$GITHUB_ENV"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.check-version.outputs.target_tag }}
          name: MAA ${{ needs.check-version.outputs.target_tag }} for ARM64
          body: |
            Automatic ARM64 build from upstream tag: ${{ needs.check-version.outputs.target_tag }}

            Bundled components:
            - MaaAssistantArknights core libraries/resources
            - maa-cli executable built from ref: ${{ needs.check-version.outputs.maa_cli_ref }}

            Build environment:
            - Ubuntu 22.04
            - Target: aarch64 Linux GNU

            Notes:
            - maa-cli is built from the standalone maa-cli project.
            - MaaCore/resources are built from the MaaAssistantArknights main repository.
            - OpenSSL cross-compilation is configured with arm64 development headers and libraries.
          files: ${{ env.ASSET_PATH }}
          draft: false
          prerelease: ${{ env.IS_PRERELEASE }}
